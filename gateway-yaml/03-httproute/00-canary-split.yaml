# Basic routing + weighted canary split (90% v1 / 10% v2)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-go
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway-api
  hostnames:
    - example-app.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: example-app-go-v1
          port: 8080
          weight: 90
        - name: example-app-go-v2
          port: 8080
          weight: 10
