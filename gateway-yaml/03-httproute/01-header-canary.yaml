# Header-based routing: force canary (v2) for requests carrying x-canary: true,
# regardless of the 90/10 weighted split in 00-canary-split.yaml.
# This works as a *separate* HTTPRoute object because Gateway API merges rules
# from every HTTPRoute bound to the same Gateway/hostname, and ranks rules by
# specificity (a header match here beats the plain "/" match in the other file)
# rather than by file/apply order.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-go-header-canary
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway-api
  hostnames:
    - example-app.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: x-canary
              value: "true"
      backendRefs:
        - name: example-app-go-v2
          port: 8080
