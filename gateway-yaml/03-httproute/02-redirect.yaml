# RequestRedirect: client-visible 301/302. Envoy never forwards this to a
# backend at all — it just tells the client "go ask this other place instead."
# Two variants below: redirecting within your own app (path only), and
# redirecting to a completely different external domain (hostname).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-go-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway-api
  hostnames:
    - example-app.com
  rules:
    # /old -> redirected to Google, external domain, real-world "this path moved
    # off our site" scenario. hostname (+ optional scheme) is what makes it
    # external instead of just changing the path on the same domain.
    - matches:
        - path:
            type: PathPrefix
            value: /old
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: www.google.com
            path:
              type: ReplaceFullPath
              replaceFullPath: /  # Redirect to the root of the new domain, if you want to keep the same prefix path, remove this line.
            statusCode: 302