apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy 
metadata:
  name: ratelimit-httproute
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: example-app-go
  rateLimit:
    local:
      rules:
      - limit:
          requests: 10
          unit: Second